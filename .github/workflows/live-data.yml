name: Refresh live investment intelligence

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: live-investment-intelligence
  cancel-in-progress: false

jobs:
  refresh-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh live public-source feed
        if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
        run: node scripts/fetch-live-data.js

      - name: Commit refreshed feed
        if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/live-investment-intel.json
          if git diff --cached --quiet; then
            echo "No feed changes to commit."
          else
            git commit -m "Refresh live investment intelligence feed"
            git push origin HEAD:main
          fi

      - name: Publish static site to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git push origin HEAD:gh-pages --force
